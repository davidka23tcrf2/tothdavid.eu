<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-1: #fff8ef;
            --bg-2: #f8e4d0;
            --bg-3: #f3c9a9;
            --accent-1: #d96c4e;
            --accent-2: #ffb36b;
            --accent-3: #b84f3d;
            --text-main: #3b241d;
            --text-soft: #6b4a3f;
            --text-muted: #8b6a5f;
        }

        *::selection {
            background: rgba(217, 108, 78, 0.2);
        }

        body {
            position: relative;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 15% 20%, rgba(255, 179, 107, 0.55), transparent 24%),
                radial-gradient(circle at 85% 15%, rgba(217, 108, 78, 0.28), transparent 22%),
                radial-gradient(circle at 75% 78%, rgba(184, 79, 61, 0.18), transparent 20%),
                linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
            isolation: isolate;
        }

        body::before {
            content: "";
            position: fixed;
            inset: -20%;
            z-index: -3;
            pointer-events: none;
            background:
                radial-gradient(circle at 20% 35%, rgba(255, 179, 107, 0.52), transparent 20%),
                radial-gradient(circle at 80% 20%, rgba(217, 108, 78, 0.4), transparent 18%),
                radial-gradient(circle at 65% 72%, rgba(255, 140, 92, 0.34), transparent 22%),
                radial-gradient(circle at 10% 85%, rgba(184, 79, 61, 0.24), transparent 18%);
            filter: blur(60px);
            animation: backgroundFlow 9s ease-in-out infinite alternate;
            transform-origin: center;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            opacity: 0.18;
            background:
                linear-gradient(rgba(255,255,255,0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.18) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: radial-gradient(circle at center, black 45%, transparent 90%);
            -webkit-mask-image: radial-gradient(circle at center, black 45%, transparent 90%);
            animation: gridDrift 12s linear infinite;
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(95px);
            opacity: 0.5;
            animation: floatOrb 9s ease-in-out infinite;
            will-change: transform;
        }

        .orb-1 {
            width: 360px;
            height: 360px;
            top: 4%;
            left: 4%;
            background: rgba(255, 179, 107, 0.42);
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            top: 8%;
            right: 8%;
            background: rgba(217, 108, 78, 0.34);
            animation-delay: -2s;
        }

        .orb-3 {
            width: 420px;
            height: 420px;
            bottom: -8%;
            left: 16%;
            background: rgba(255, 150, 120, 0.3);
            animation-delay: -4s;
        }

        .orb-4 {
            width: 320px;
            height: 320px;
            bottom: 4%;
            right: 10%;
            background: rgba(184, 79, 61, 0.26);
            animation-delay: -1s;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            z-index: 1;
        }

        .content {
            width: min(100%, 900px);
        }

        h1 {
            font-family: Georgia, "Times New Roman", Times, serif;
            font-size: clamp(2.2rem, 6vw, 5.5rem);
            font-weight: 600;
            letter-spacing: 0.08em;
            margin-bottom: 1rem;
            color: var(--text-main);
            text-transform: uppercase;
            white-space: nowrap;
            line-height: 1;
            text-shadow: 0 3px 12px rgba(255, 255, 255, 0.22);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-soft);
            margin-bottom: 2.25rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
        }

        .social-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(121, 70, 52, 0.08);
        }

        .social-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .social-icon:hover {
            transform: translateY(-4px) scale(1.03);
            background: rgba(255, 255, 255, 0.45);
        }

        .social-icon.ig:hover {
            color: #c75b47;
            box-shadow: 0 0 24px rgba(199, 91, 71, 0.22);
        }

        .social-icon.fb:hover {
            color: #9c5f46;
            box-shadow: 0 0 24px rgba(156, 95, 70, 0.2);
        }

        .social-icon.gh:hover {
            color: #5a3d33;
            box-shadow: 0 0 24px rgba(90, 61, 51, 0.18);
        }

        footer {
            padding: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            z-index: 1;
            border-top: 1px solid rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
        }

        @keyframes backgroundFlow {
            0% {
                transform: translate3d(-6%, -4%, 0) scale(1) rotate(0deg);
            }
            25% {
                transform: translate3d(5%, -2%, 0) scale(1.08) rotate(4deg);
            }
            50% {
                transform: translate3d(8%, 5%, 0) scale(1.14) rotate(-4deg);
            }
            75% {
                transform: translate3d(-4%, 8%, 0) scale(1.08) rotate(3deg);
            }
            100% {
                transform: translate3d(-8%, 4%, 0) scale(1.12) rotate(-3deg);
            }
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            20% {
                transform: translate(40px, -35px) scale(1.12);
            }
            40% {
                transform: translate(-30px, 30px) scale(0.92);
            }
            60% {
                transform: translate(55px, 18px) scale(1.08);
            }
            80% {
                transform: translate(-22px, -42px) scale(0.96);
            }
            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        @keyframes gridDrift {
            0% {
                transform: translate3d(0, 0, 0);
            }
            50% {
                transform: translate3d(-12px, -8px, 0);
            }
            100% {
                transform: translate3d(0, 0, 0);
            }
        }

        @media (max-width: 640px) {
            h1 {
                font-size: clamp(1.6rem, 8vw, 3rem);
                letter-spacing: 0.05em;
            }

            p {
                font-size: 1rem;
            }

            .social-links {
                gap: 0.9rem;
            }

            .social-icon {
                width: 48px;
                height: 48px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            body::before,
            body::after,
            .orb {
                animation: none;
            }

            .social-icon {
                transition: none;
            }
        }
    </style>
</head>
<body>
